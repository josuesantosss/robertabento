<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendas Cosméticos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <button data-page="home">🏠 Home</button>
      <button data-page="cadastro">➕ Cadastrar Produto</button>
      <button data-page="consulta">🔍 Consultar Estoque</button>
      <button data-page="vendas">💰 Registrar Venda</button>
    </nav>
  </header>

  <main id="app">
    <!-- As seções serão carregadas aqui via JS -->
  </main>

  <script src="script.js"></script>
  
  <!-- Carrega os produtos no dropdown ao iniciar a página de consulta -->
  <script>
    // Sobrescreve o renderPage para carregar o dropdown quando for a página de consulta
    const renderPageOriginal = renderPage;
    renderPage = function(page) {
      renderPageOriginal(page);
      if (page === 'consulta') {
        // Aguarda um pequeno delay para o DOM ser renderizado
        setTimeout(() => {
          carregarProdutosNoDropdown();
        }, 100);
      }
    };
  </script>
</body>
</html>
