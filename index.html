<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💄 Sistema de Cosméticos</title>
    <style>
        :root { --primary: #764ba2; --secondary: #667eea; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; padding: 20px; text-align: center; }
        nav { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        button { cursor: pointer; padding: 8px 16px; border: none; border-radius: 20px; background: rgba(255,255,255,0.2); color: white; }
        button.active { background: white; color: var(--primary); font-weight: bold; }
        main { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-action { background: var(--primary); color: white; width: 100%; padding: 12px; border-radius: 6px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <h1>💄 Sistema de Vendas</h1>
    <nav id="nav">
        <button onclick="render('home')" class="active">Home</button>
        <button onclick="render('cadastro')">Cadastrar</button>
        <button onclick="render('consulta')">Estoque</button>
    </nav>
</header>

<main id="app"></main>

<script>
    const API_URL = 'SUA_URL_DO_GOOGLE_SCRIPT_AQUI';

    // Função central de comunicação
    async function callAPI(action, data = null) {
        const options = {
            method: data ? 'POST' : 'GET',
            headers: { 'Content-Type': 'application/json' },
            body: data ? JSON.stringify(data) : null
        };
        const response = await fetch(`${API_URL}?action=${action}`, options);
        return await response.json();
    }

    // Gerenciador de Páginas
    function render(page) {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        const app = document.getElementById('app');

        if (page === 'home') app.innerHTML = `<h2>Dashboard</h2><p>Bem-vindo ao sistema.</p>`;
        
        if (page === 'cadastro') app.innerHTML = `
            <h2>Cadastrar Produto</h2>
            <form onsubmit="handleCadastro(event)">
                <div class="form-group"><input type="text" id="nome" placeholder="Nome" required></div>
                <div class="form-group"><input type="number" id="preco" placeholder="Preço" step="0.01" required></div>
                <div class="form-group"><input type="number" id="qtd" placeholder="Quantidade" required></div>
                <button type="submit" class="btn-action">Salvar</button>
            </form>`;

        if (page === 'consulta') {
            app.innerHTML = `<h2>Estoque</h2><div id="lista">Carregando...</div>`;
            carregarProdutos();
        }
    }

    async function handleCadastro(e) {
        e.preventDefault();
        const data = { nome: document.getElementById('nome').value, preco: document.getElementById('preco').value, quantidade: document.getElementById('qtd').value };
        const res = await callAPI('cadastrarProduto', data);
        alert(res.success ? "Sucesso!" : "Erro!");
    }

    async function carregarProdutos() {
        const res = await callAPI('listarProdutos');
        if(!res.produtos) return document.getElementById('lista').innerHTML = "Nenhum produto.";
        let html = `<table><tr><th>Nome</th><th>Preço</th><th>Qtd</th></tr>`;
        res.produtos.forEach(p => html += `<tr><td>${p.nome}</td><td>R$ ${p.preco}</td><td>${p.quantidade}</td></tr>`);
        document.getElementById('lista').innerHTML = html + `</table>`;
    }
</script>
</body>
</html>
